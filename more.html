<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NexBank - More</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #171c2e;
    --border: rgba(255,255,255,0.07);
    --accent: #4f8bff;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --card-radius: 14px;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    -webkit-font-smoothing: antialiased;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    overflow-x: hidden;
    padding-bottom: 110px;
  }

  .header {
    padding: 32px 24px 20px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .content {
    padding: 0 18px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .menu-group {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .menu-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    text-decoration: none;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { background: var(--surface2); }

  .mi-left { display: flex; align-items: center; gap: 14px; font-size: 14px; font-weight: 500; }
  .mi-icon { font-size: 18px; width: 24px; text-align: center; }
  .arrow-icon { font-size: 16px; color: var(--muted); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 390px;
    background: rgba(10,13,20,0.93);
    backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
    border-top: 1px solid var(--border);
    padding: 10px 0 env(safe-area-inset-bottom, 16px);
    display: flex; justify-content: space-around;
    z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 20px; border-radius: 14px;
    text-decoration: none; color: var(--muted);
    font-family: 'Sora', sans-serif;
    transition: color 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item:hover { color: var(--text); }

  .nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 18px; position: relative; }
  .nav-item.active .nav-icon::after {
    content: ''; position: absolute; bottom: -3px;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 7px var(--accent);
  }
  .nav-label { font-size: 10px; font-weight: 500; }
</style>
</head>
<body>
<div class="phone">

  <header class="header">
    <h1>More Options</h1>
  </header>

  <main class="content">
    <div class="menu-group">
      <a href="#" class="menu-item">
        <div class="mi-left"><span class="mi-icon">👤</span>Profile Settings</div>
        <div class="arrow-icon">›</div>
      </a>
      <a href="#" class="menu-item">
        <div class="mi-left"><span class="mi-icon">⚙️</span>App Preferences</div>
        <div class="arrow-icon">›</div>
      </a>
      <a href="#" class="menu-item">
        <div class="mi-left"><span class="mi-icon">🔒</span>Security &amp; Privacy</div>
        <div class="arrow-icon">›</div>
      </a>
    </div>

    <div class="menu-group">
      <a href="#" class="menu-item">
        <div class="mi-left"><span class="mi-icon">📈</span>Investment Portfolio</div>
        <div class="arrow-icon">›</div>
      </a>
      <a href="#" class="menu-item">
        <div class="mi-left"><span class="mi-icon">🛡️</span>Insurance Products</div>
        <div class="arrow-icon">›</div>
      </a>
    </div>

    <div class="menu-group">
      <a href="#" class="menu-item">
        <div class="mi-left"><span class="mi-icon">💬</span>Help &amp; Live Support</div>
        <div class="arrow-icon">›</div>
      </a>
      <a href="#" class="menu-item" style="color: var(--red);">
        <div class="mi-left"><span class="mi-icon">🚪</span>Sign Out</div>
        <div class="arrow-icon">›</div>
      </a>
    </div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="dashboard.html" class="nav-item">
      <div class="nav-icon">🏦</div>
      <span class="nav-label">Accounts</span>
    </a>
    <a href="pay.html" class="nav-item">
      <div class="nav-icon">💸</div>
      <span class="nav-label">Pay &amp; Transfer</span>
    </a>
    <a href="more.html" class="nav-item active" aria-current="page">
      <div class="nav-icon">☰</div>
      <span class="nav-label">More</span>
    </a>
  </nav>
</div>
</body>
</html>
