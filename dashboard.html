<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Forbright Bank — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0d1512;
    --ink-2:#131e19;
    --paper:#f3f5f4;
    --paper-2:#ffffff;
    --jade:#1f6f54;
    --jade-dark:#154f3c;
    --gold:#c89b3c;
    --ink-muted:#8a9a93;
    --slate:#232b27;
    --slate-muted:#6b756f;
    --line:#dde3e0;
    --error:#b3452f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Manrope', sans-serif;
    background:var(--paper);
    color:var(--slate);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- NAV ---------- */
  nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:1.1rem 2.5rem;
    background:var(--paper-2);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:.6rem;}
  .brand-mark{
    width:26px;height:26px;
    border-radius:50%;
    border:1.5px solid var(--gold);
    position:relative;
    flex-shrink:0;
  }
  .brand-mark::after{
    content:"";
    position:absolute; top:50%; left:50%;
    width:60%; height:1.5px;
    background:var(--gold);
    transform:translate(-50%,-50%) rotate(-38deg);
  }
  .brand-name{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.05rem;
  }
  .nav-right{display:flex; align-items:center; gap:1.2rem;}
  .quick-add-btn{
    width:22px;
    height:22px;
    border-radius:50%;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-muted);
    font-size:.78rem;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    opacity:.55;
    transition:opacity .18s ease, border-color .18s ease, color .18s ease;
  }
  .quick-add-btn:hover{opacity:1; border-color:var(--jade); color:var(--jade-dark);}
  .nav-user{font-size:.88rem; color:var(--slate-muted);}
  .nav-user strong{color:var(--slate); font-weight:700;}
  .signout-btn{
    padding:.5rem 1rem;
    border:1.5px solid var(--line);
    background:var(--paper-2);
    border-radius:8px;
    font-family:'Manrope', sans-serif;
    font-weight:600;
    font-size:.82rem;
    color:var(--slate);
    cursor:pointer;
    transition:border-color .18s ease;
  }
  .signout-btn:hover{border-color:var(--error); color:var(--error);}

  /* ---------- LAYOUT ---------- */
  main{
    max-width:1080px;
    margin:0 auto;
    padding:2.5rem 2.5rem 4rem;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1.6rem;
    align-items:start;
  }

  .greeting{
    grid-column:1 / -1;
    margin-bottom:.2rem;
  }
  .greeting .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:.72rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--jade-dark);
    margin:0 0 .3rem;
  }
  .greeting h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.7rem;
    margin:0;
  }

  /* ---------- BALANCE CARD (ink) ---------- */
  .balance-card{
    background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%);
    color:var(--paper);
    border-radius:16px;
    padding:2rem;
    position:relative;
    overflow:hidden;
  }
  .balance-card .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:.74rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-muted);
    margin:0 0 .6rem;
  }
  .balance-amount{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:2.6rem;
    letter-spacing:-.01em;
    margin:0 0 .3rem;
  }
  .balance-amount .cents{font-size:1.5rem; color:var(--ink-muted);}
  .acct-number{
    font-family:'IBM Plex Mono', monospace;
    font-size:.82rem;
    color:var(--ink-muted);
    margin:0 0 1.8rem;
  }
  .balance-actions{
    display:flex;
    gap:.7rem;
  }
  .balance-actions button{
    flex:1;
    padding:.7rem 0;
    border-radius:9px;
    border:none;
    font-family:'Manrope', sans-serif;
    font-weight:700;
    font-size:.86rem;
    cursor:pointer;
    transition:transform .12s ease, background .18s ease;
  }
  .btn-add{background:var(--gold); color:var(--ink);}
  .btn-add:hover{background:#d9ac52;}
  .btn-withdraw{background:transparent; color:var(--paper); border:1.5px solid rgba(243,245,244,.35) !important;}
  .btn-withdraw:hover{border-color:var(--paper) !important;}
  .balance-actions button:active{transform:scale(.98);}

  /* inline amount form inside balance card */
  .amount-form{
    margin-top:1.4rem;
    display:none;
    border-top:1px solid rgba(243,245,244,.14);
    padding-top:1.2rem;
  }
  .amount-form.open{display:block;}
  .amount-form label{
    display:block;
    font-size:.76rem;
    color:var(--ink-muted);
    margin-bottom:.4rem;
  }
  .amount-form input{
    width:100%;
    padding:.68rem .8rem;
    border-radius:8px;
    border:1.5px solid rgba(243,245,244,.2);
    background:rgba(243,245,244,.06);
    color:var(--paper);
    font-family:'IBM Plex Mono', monospace;
    font-size:1rem;
    margin-bottom:.8rem;
  }
  .amount-form input::placeholder{color:var(--ink-muted);}
  .amount-form input:focus{outline:none; border-color:var(--gold);}
  .amount-form .form-row{display:flex; gap:.6rem;}
  .amount-form .confirm-btn{
    flex:1;
    background:var(--jade);
    color:var(--paper);
    border:none;
    border-radius:8px;
    padding:.65rem 0;
    font-family:'Manrope', sans-serif;
    font-weight:700;
    font-size:.85rem;
    cursor:pointer;
  }
  .amount-form .confirm-btn:hover{background:#25805f;}
  .amount-form .cancel-btn{
    background:transparent;
    color:var(--ink-muted);
    border:1.5px solid rgba(243,245,244,.2);
    border-radius:8px;
    padding:.65rem 1rem;
    font-family:'Manrope', sans-serif;
    font-weight:600;
    font-size:.85rem;
    cursor:pointer;
  }
  .amount-form .err{
    font-size:.78rem;
    color:#e79a89;
    margin:-.4rem 0 .7rem;
    min-height:1em;
  }

  /* ---------- ACTIVITY CARD ---------- */
  .activity-card{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:16px;
    padding:1.8rem;
  }
  .activity-card h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.15rem;
    margin:0 0 1rem;
  }
  .txn-list{
    list-style:none;
    margin:0; padding:0;
    display:flex;
    flex-direction:column;
    gap:.2rem;
    max-height:360px;
    overflow-y:auto;
  }
  .txn-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:.75rem .1rem;
    border-bottom:1px solid var(--line);
  }
  .txn-row:last-child{border-bottom:none;}
  .txn-left{display:flex; flex-direction:column; gap:.15rem;}
  .txn-note{font-size:.88rem; font-weight:600; color:var(--slate);}
  .txn-date{font-family:'IBM Plex Mono', monospace; font-size:.72rem; color:var(--slate-muted);}
  .txn-amt{font-family:'IBM Plex Mono', monospace; font-weight:500; font-size:.92rem;}
  .txn-amt.pos{color:var(--jade-dark);}
  .txn-amt.neg{color:var(--error);}
  .empty-state{
    color:var(--slate-muted);
    font-size:.88rem;
    padding:1.5rem 0;
    text-align:center;
  }

  .toast{
    position:fixed;
    bottom:1.5rem; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:var(--paper);
    padding:.8rem 1.3rem;
    border-radius:9px;
    font-size:.86rem;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:10;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.error{background:var(--error);}

  .loading-screen{
    position:fixed; inset:0;
    background:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'IBM Plex Mono', monospace;
    color:var(--slate-muted);
    font-size:.85rem;
    letter-spacing:.05em;
    z-index:20;
  }

  @media (max-width: 780px){
    nav{padding:1rem 1.3rem;}
    main{grid-template-columns:1fr; padding:1.8rem 1.3rem 3rem;}
    .nav-user{display:none;}
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">LOADING ACCOUNT…</div>

<nav>
  <div class="brand">
    <span class="brand-mark" aria-hidden="true"></span>
    <span class="brand-name">Forbright</span>
  </div>
  <div class="nav-right">
    <button class="quick-add-btn" id="quickAddBtn" title="Add funds" aria-label="Add funds">+</button>
    <span class="nav-user" id="navUser"></span>
    <button class="signout-btn" id="signOutBtn">Log out</button>
  </div>
</nav>

<main>
  <div class="greeting">
    <p class="eyebrow">Account overview</p>
    <h1 id="greetingText">Welcome back</h1>
  </div>

  <!-- BALANCE CARD -->
  <div class="balance-card">
    <p class="label">Available balance</p>
    <p class="balance-amount" id="balanceAmount">$0<span class="cents">.00</span></p>
    <p class="acct-number" id="acctNumber">Account •••• ----</p>

    <div class="balance-actions">
      <button class="btn-withdraw" id="goTransfer" style="border:1.5px solid rgba(243,245,244,.35);">→ Transfer</button>
    </div>

    <!-- Add funds inline form -->
    <div class="amount-form" id="addForm">
      <label for="addAmount">Amount to add</label>
      <input type="number" id="addAmount" placeholder="0.00" min="0.01" step="0.01">
      <p class="err" id="addErr"></p>
      <div class="form-row">
        <button class="confirm-btn" id="confirmAdd">Add funds</button>
        <button class="cancel-btn" data-cancel="addForm">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ACTIVITY CARD -->
  <div class="activity-card">
    <h2>Recent activity</h2>
    <ul class="txn-list" id="txnList">
      <li class="empty-state">No transactions yet.</li>
    </ul>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // SUPABASE CONFIG — replace these two placeholders
  // (use the same project as forbright-auth.html)
  // ============================================================
  const SUPABASE_URL = "https://kmjmqrrmzdtovovzigxk.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_y8Ai2hQcJfHSU5ilkEFCSg_lmh1_leb";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let currentBalance = 0;

  function formatMoney(n){
    const parts = Math.abs(n).toFixed(2).split('.');
    const whole = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return { whole, cents: parts[1], negative: n < 0 };
  }

  function renderBalance(n){
    const f = formatMoney(n);
    document.getElementById('balanceAmount').innerHTML =
      (f.negative ? '−' : '') + '$' + f.whole + '<span class="cents">.' + f.cents + '</span>';
  }

  function showToast(message, isError){
    const t = document.getElementById('toast');
    t.textContent = message;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(()=>{ t.className = 'toast'; }, 2600);
  }

  function toggleForm(id){
    document.getElementById(id).classList.toggle('open');
  }
  document.getElementById('quickAddBtn').addEventListener('click', ()=>{
    toggleForm('addForm');
    const form = document.getElementById('addForm');
    if(form.classList.contains('open')){
      form.scrollIntoView({ behavior: 'smooth', block: 'center' });
      document.getElementById('addAmount').focus();
    }
  });
  document.getElementById('goTransfer').addEventListener('click', ()=>{
    window.location.href = 'transfer.html';
  });
  document.querySelectorAll('[data-cancel]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.getElementById(btn.dataset.cancel).classList.remove('open');
    });
  });

  // ---- render transaction list ----
  function renderTransactions(rows){
    const list = document.getElementById('txnList');
    if(!rows || rows.length === 0){
      list.innerHTML = '<li class="empty-state">No transactions yet.</li>';
      return;
    }
    list.innerHTML = rows.map(r=>{
      const isPos = r.amount >= 0;
      const f = formatMoney(r.amount);
      return `<li class="txn-row">
        <div class="txn-left">
          <span class="txn-note">${isPos ? 'Transfer received' : 'Transfer sent'}</span>
        </div>
        <span class="txn-amt ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : '−'}$${f.whole}.${f.cents}</span>
      </li>`;
    }).join('');
  }

  // ---- sample/demo transaction generator ----
  // Used as a fallback whenever the "transactions" table has no rows yet
  // (e.g. a fresh Supabase project) so the dashboard isn't empty. Skews
  // toward more "sent" (outgoing/negative) entries than "received" ones,
  // like a typical spending pattern. Purely cosmetic — never written to
  // the database.
  function generateSampleTransactions(count = 12){
    const now = Date.now();
    const rows = [];

    for(let i = 0; i < count; i++){
      // ~70% of sample transactions are outgoing ("sent")
      const isSent = Math.random() < 0.7;
      const amount = isSent
        ? -Math.round((Math.random() * 180 + 4) * 100) / 100
        : Math.round((Math.random() * 900 + 40) * 100) / 100;
      const daysAgo = Math.floor(Math.random() * 24);
      const jitterMs = Math.floor(Math.random() * 86400000);

      rows.push({
        amount,
        note: isSent ? 'Transfer sent' : 'Transfer received',
        created_at: new Date(now - daysAgo * 86400000 - jitterMs).toISOString()
      });
    }

    rows.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    return rows;
  }

  // ---- load transactions from Supabase ----
  // Requires a "transactions" table — see setup.sql for schema + RLS policies.
  // Falls back to generated sample activity if the table is empty or errors.
  async function loadTransactions(userId){
    const { data, error } = await supabaseClient
      .from('transactions')
      .select('*')
      .eq('user_id', userId)
      .order('created_at', { ascending: false })
      .limit(10);

    if(error){
      console.error('Could not load transactions:', error.message);
      renderTransactions(generateSampleTransactions());
      return;
    }

    if(!data || data.length === 0){
      renderTransactions(generateSampleTransactions());
      return;
    }

    renderTransactions(data);
  }

  // ---- update balance in Supabase ----
  // logTransaction=false updates the balance without writing a row to
  // "transactions" — used by the quick-add flow so it never shows up
  // in Recent activity.
  async function applyTransaction(amount, note, logTransaction = true){
    const newBalance = currentBalance + amount;

    const { error: updateError } = await supabaseClient
      .from('balances')
      .update({ balance: newBalance })
      .eq('id', currentUser.id);

    if(updateError){
      showToast('Could not update balance: ' + updateError.message, true);
      return false;
    }

    if(logTransaction){
      const { error: insertError } = await supabaseClient
        .from('transactions')
        .insert({ user_id: currentUser.id, amount, note });

      if(insertError){
        console.error('Balance updated but transaction log failed:', insertError.message);
      }
    }

    currentBalance = newBalance;
    renderBalance(currentBalance);

    if(logTransaction){
      loadTransactions(currentUser.id);
    }
    return true;
  }

  document.getElementById('confirmAdd').addEventListener('click', async ()=>{
    const input = document.getElementById('addAmount');
    const err = document.getElementById('addErr');
    const value = parseFloat(input.value);

    if(isNaN(value) || value <= 0){
      err.textContent = 'Enter an amount greater than 0.';
      return;
    }
    err.textContent = '';

    const ok = await applyTransaction(value, 'Funds added', false);
    if(ok){
      input.value = '';
      document.getElementById('addForm').classList.remove('open');
      showToast('Added $' + value.toFixed(2) + ' to your balance.');
    }
  });

  // ---- sign out ----
  document.getElementById('signOutBtn').addEventListener('click', async ()=>{
    await supabaseClient.auth.signOut();
    window.location.href = 'forbright-auth.html';
  });

  // ---- boot: check session, check for a persistent hold, load balance + name + transactions ----
  (async function init(){
    const { data: sessionData } = await supabaseClient.auth.getSession();

    if(!sessionData.session){
      window.location.href = 'forbright-auth.html';
      return;
    }

    currentUser = sessionData.session.user;

    const { data: balanceRow, error: balanceError } = await supabaseClient
      .from('balances')
      .select('*')
      .eq('id', currentUser.id)
      .single();

    if(balanceError){
      console.error('Could not load balance:', balanceError.message);
      showToast('Could not load your balance.', true);
    } else if(balanceRow){
      // Persistent hold check — routes flagged accounts back to blocked.html
      // even after logging out and back in.
      if(balanceRow.blocked){
        window.location.href = 'blocked.html';
        return;
      }

      currentBalance = balanceRow.balance || 0;
      renderBalance(currentBalance);

      const name = balanceRow.full_name || currentUser.email;
      document.getElementById('greetingText').textContent = 'Welcome back, ' + name.split(' ')[0];
      document.getElementById('navUser').innerHTML = '<strong>' + name + '</strong>';
    }

    document.getElementById('acctNumber').textContent =
      'Account •••• ' + currentUser.id.slice(0, 4).toUpperCase();

    await loadTransactions(currentUser.id);

    document.getElementById('loadingScreen').style.display = 'none';

    const transferNote = sessionStorage.getItem('transferSuccess');
    if(transferNote){
      showToast(transferNote);
      sessionStorage.removeItem('transferSuccess');
    }
  })();
</script>

</body>
</html>
