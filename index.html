<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Received</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:420px;
    background:#fff;
    border-radius:18px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.12);
}

.success{
    width:80px;
    height:80px;
    background:#16a34a;
    color:#fff;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    margin:0 auto 20px;
}

h2{
    color:#111827;
    margin-bottom:12px;
}

.message{
    color:#555;
    font-size:17px;
    line-height:1.6;
}

.balance-box{
    margin:28px 0;
    background:#f8fafc;
    border-radius:14px;
    padding:18px;
}

.balance-label{
    color:#777;
    font-size:14px;
}

.balance{
    color:#16a34a;
    font-size:38px;
    font-weight:bold;
    margin-top:8px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="card">

<div class="success">✓</div>

<h2>Payment Received</h2>

<p class="message">
<b>Lawrence Smith</b> sent you <b>$300.00</b>.
</p>

<div class="balance-box">
<div class="balance-label">Available Balance</div>
<div class="balance">$300.00</div>
</div>

<button onclick="proceed()">Proceed</button>

</div>

<script>
function proceed(){
    alert("Proceed button clicked!");
    // Replace this with your desired action.
    // Example:
    // window.location.href = "dashboard.html";
}
</script>

</body>
</html>
