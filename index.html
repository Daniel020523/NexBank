<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sky Shipments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050b14;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Entry Screen */
        #gatekeeper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050b14;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        .launch-btn {
            padding: 20px 50px;
            font-size: 1.2rem;
            color: #00ffcc;
            background: transparent;
            border: 2px solid #00ffcc;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .launch-btn:hover {
            background: #00ffcc;
            color: #050b14;
            box-shadow: 0 0 35px rgba(0, 255, 204, 0.6);
        }

        /* HTML Overlay for Text Arrangement */
        #text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 90%;
            text-align: center;
            pointer-events: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .letter {
            font-size: 5.5rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            display: inline-block;
            opacity: 0;
            transform: scale(0) rotate(180deg);
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Class added dynamically when hit */
        .letter.arranged {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        /* Main Site Content UI */
        #main-ui {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
            opacity: 0;
            transition: opacity 1.5s ease;
            text-align: center;
            pointer-events: none;
        }

        #main-ui.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .tagline {
            color: #8ab4f8;
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="gatekeeper" onclick="startImpactSequence()">
        <button class="launch-btn">Initialize System</button>
    </div>

    <div id="canvas-container"></div>

    <div id="text-overlay"></div>

    <div id="main-ui">
        <p class="tagline">Global Logistics Reimagined</p>
    </div>

    <script>
        let scene, camera, renderer, airplane, targetCircle, particles;
        let animationActive = false;
        let startTime = 0;
        const textString = "GLOBAL SKY SHIPMENTS";

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0x00ffcc, 1.5);
            directional.position.set(5, 10, 7);
            scene.add(directional);

            // 1. Create the Spinning Circular Target
            const circleGeo = new THREE.RingGeometry(8, 8.3, 64);
            const circleMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, side: THREE.DoubleSide, transparent: true });
            targetCircle = new THREE.Mesh(circleGeo, circleMat);
            scene.add(targetCircle);

            // Add inner radar lines to the circle
            const innerRingGeo = new THREE.RingGeometry(5, 5.1, 32);
            const innerRing = new THREE.Mesh(innerRingGeo, circleMat);
            targetCircle.add(innerRing);

            // 2. Build Realistic 3D Airplane (Hidden far back in dark space initially)
            airplane = new THREE.Group();
            
            const bodyGeo = new THREE.CylinderGeometry(0.6, 0.4, 6, 16);
            bodyGeo.rotateX(Math.PI / 2);
            const metalMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8, roughness: 0.2 });
            const fuselage = new THREE.Mesh(bodyGeo, metalMat);
            airplane.add(fuselage);

            const wingGeo = new THREE.BoxGeometry(9, 0.1, 1.5);
            const wings = new THREE.Mesh(wingGeo, metalMat);
            wings.position.set(0, 0, 0.5);
            airplane.add(wings);

            const tailGeo = new THREE.BoxGeometry(2.5, 0.1, 0.8);
            const tail = new THREE.Mesh(tailGeo, metalMat);
            tail.position.set(0, 0, -2.5);
            airplane.add(tail);

            airplane.position.set(0, 0, -150); // Start far away out of view
            scene.add(airplane);

            // 3. Prepare Text Elements in HTML structure
            const textOverlay = document.getElementById('text-overlay');
            textString.split("").forEach(char => {
                const span = document.createElement('span');
                span.className = 'letter';
                span.innerHTML = char === " " ? "&nbsp;&nbsp;" : char;
                textOverlay.appendChild(span);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Constant passive rotation of the circle before impact
            if (targetCircle) {
                targetCircle.rotation.z += 0.01;
                targetCircle.rotation.y += 0.005;
            }

            if (animationActive) {
                let elapsed = (performance.now() - startTime) / 1000;

                // PHASE 1: Airplane flies from nowhere out of deep space towards the circle
                if (elapsed < 1.8) {
                    // Fly straight out towards camera/circle
                    airplane.position.z = THREE.MathUtils.lerp(-150, 0, elapsed / 1.8);
                    // Add slight dramatic wobble
                    airplane.position.x = Math.sin(elapsed * 10) * 0.2;
                } 
                
                // PHASE 2: The Hit / Impact moment
                else if (elapsed >= 1.8 && targetCircle) {
                    // Explode the circle into particles
                    explodeCircle();
                    
                    // Make airplane streak past camera offscreen
                    airplane.position.z += 4;
                    airplane.scale.multiplyScalar(1.02);

                    // Arrange letters progressively after impact
                    arrangeLetters();
                    
                    // Show final UI
                    document.getElementById('main-ui').classList.add('visible');
                }
            }

            renderer.render(scene, camera);
        }

        function explodeCircle() {
            // Spawn explosion particle system where the circle was
            if (!particles) {
                const pCount = 150;
                const geom = new THREE.BufferGeometry();
                const positions = [];
                const velocities = [];

                for(let i=0; i<pCount; i++) {
                    positions.push(targetCircle.position.x, targetCircle.position.y, targetCircle.position.z);
                    velocities.push(
                        (Math.random() - 0.5) * 30,
                        (Math.random() - 0.5) * 30,
                        (Math.random() - 0.5) * 30
                    );
                }

                geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                const mat = new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.4, transparent: true });
                particles = new THREE.Points(geom, mat);
                particles.userData = { velocities: velocities };
                scene.add(particles);

                // Remove the original clean circle
                scene.remove(targetCircle);
                targetCircle = null;
            } else {
                // Animate the flying debris particles outwards
                const posArr = particles.geometry.attributes.position.array;
                const vels = particles.userData.velocities;
                for(let i=0; i<posArr.length; i++) {
                    posArr[i] += vels[i] * 0.016;
                }
                particles.geometry.attributes.position.needsUpdate = true;
                particles.material.opacity -= 0.01;
            }
        }

        function arrangeLetters() {
            const letters = document.querySelectorAll('.letter');
            letters.forEach((letter, index) => {
                // Staggered delay so they finish arranging cleanly one after the other
                setTimeout(() => {
                    letter.classList.add('arranged');
                }, index * 80); 
            });
        }

        function startImpactSequence() {
            document.getElementById('gatekeeper').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gatekeeper').style.display = 'none';
            }, 800);

            startTime = performance.now();
            animationActive = true;
        }

        window.onload = init;
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
