<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ONE - Clothing Brand</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* --- VIDEO CONTAINER --- */
        #video-experience {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
        }

        /* Video element styled to fit like a cinematic reel/TikTok style */
        .story-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            max-width: 500px; /* Gives it a clean mobile-portrait look on desktop */
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            background: #222;
        }

        /* Interactive Trigger Overlay */
        #click-prompt {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        .prompt-text {
            color: #fff;
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 2px solid #fff;
            padding: 15px 35px;
            font-weight: 500;
        }

        /* Shop Button Overlay (Appears right when they smile at the screen) */
        #shop-overlay {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        #shop-overlay.reveal {
            opacity: 1;
            pointer-events: auto;
        }

        .shop-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.2s, background-color 0.2s;
        }

        .shop-btn:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }

        /* --- THE FINAL WEBSITE HOMEPAGE --- */
        #main-site {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #ffffff;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s ease, visibility 1.2s;
        }

        #main-site.active {
            opacity: 1;
            visibility: visible;
            z-index: 50; /* Bring above video layer */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            border-bottom: 1px solid #eee;
        }

        .brand-name {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #000;
        }

        nav a {
            text-decoration: none;
            color: #333;
            margin-left: 35px;
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 90px);
            background: #fafafa;
        }

        .hero-heading {
            font-size: 4.5rem;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #111;
        }
    </style>
</head>
<body>

    <div id="video-experience">
        <div id="click-prompt" onclick="playCinematic()">
            <div class="prompt-text">Enter Experience</div>
        </div>

        <video id="brandVideo" class="story-video" playsinline>
            <source src="your-video-file.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div id="shop-overlay">
            <button class="shop-btn" onclick="revealWebsite()">Shop "The One"</button>
        </div>
    </div>

    <div id="main-site">
        <header>
            <div class="brand-name">THE ONE</div>
            <nav>
                <a href="#">Collections</a>
                <a href="#">The Wardrobe</a>
                <a href="#">Our Story</a>
            </nav>
        </header>
        
        <main class="hero-section">
            <h1 class="hero-heading">Found.<br>Triumphant.</h1>
        </main>
    </div>

    <script>
        const video = document.getElementById('brandVideo');
        const prompt = document.getElementById('click-prompt');
        const shopOverlay = document.getElementById('shop-overlay');
        const mainSite = document.getElementById('main-site');

        function playCinematic() {
            // Hide entry overlay prompt
            prompt.style.opacity = '0';
            setTimeout(() => prompt.style.display = 'none', 500);

            // Play the video file
            video.play();
        }

        // Listen to the timing of the video clip
        video.addEventListener('timeupdate', () => {
            // ADJUST THIS NUMBER: Change 6.0 to the exact second in your video 
            // where the actor turns around, smiles, and holds the clothes up.
            if (video.currentTime >= 6.0) {
                shopOverlay.classList.add('reveal');
            }
        });

        // Loop fallback: If they miss the button, keep it on screen at the end frame
        video.addEventListener('ended', () => {
            shopOverlay.classList.add('reveal');
        });

        function revealWebsite() {
            // Smoothly dissolve out video context and activate main landing site
            mainSite.classList.add('active');
        }
    </script>
</body>
</html>
