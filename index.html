<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ONE - Clothing Brand</title>
    <style>
        /* Base Styles and Layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevent scrolling during intro */
            background-color: #fefefe;
        }

        /* --- INTRO SEQUENCE CONTAINER --- */
        #intro-sequence {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background-color: #000; /* Backdrop for room focus */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease-out; /* Fade out effect */
        }

        /* --- THE ROOM VIEW (Chaos Phase) --- */
        #room-view {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #222; /* Room backdrop color */
            transition: opacity 0.5s ease-in-out;
        }

        /* The Character (Stylized Silhouette for motion focus) */
        .character {
            position: absolute;
            bottom: 10%;
            width: 150px;
            height: 300px;
            background: #555; /* Neutral tone for character */
            border-radius: 20px;
            z-index: 5;
        }

        /* Dynamic Flying Clothes */
        .flying-cloth {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* Chaos Animation Sequence */
        @keyframes scatterClothes {
            0% { transform: translate(0, 0) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(1.2); }
        }

        /* --- THE SMILE VIEW (Discovery Phase) --- */
        #smile-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0; /* Initially Hidden */
            transition: opacity 1s ease-in-out;
            background: radial-gradient(circle at center, #fff 0%, #eee 100%); /* Clean contrast */
            z-index: 20;
        }

        /* Key Shot: Holding the One Piece */
        .hero-portrait {
            font-size: 150px; /* Stylized representation */
            animation: heroFocus 1.5s ease-out forwards;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
            margin-bottom: 20px;
        }

        /* The 'Perfect Piece' indicator */
        .perfect-piece {
            width: 120px;
            height: 180px;
            background-color: #333; /* The chosen black tee, perhaps */
            border-radius: 10px;
            margin-top: -50px; /* Held near face */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes heroFocus {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Dynamic CTA that appears last */
        #enter-cta {
            padding: 15px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            opacity: 0; /* Hidden initially */
            transition: background-color 0.3s ease, transform 0.2s ease, opacity 1s ease 1s; /* Delayed appearance */
        }

        #enter-cta:hover {
            background-color: #333;
            transform: translateY(-3px);
        }

        /* State for active view */
        #smile-view.active {
            opacity: 1;
        }

        #smile-view.active #enter-cta {
            opacity: 1;
        }

        /* --- MAIN HOMEPAGE (Destination) --- */
        #main-site {
            display: none; /* Initially Hidden */
            opacity: 0;
            transition: opacity 1.5s ease-in;
            height: 100vh;
            width: 100%;
            background-color: #fefefe;
        }

        /* Minimal Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            border-bottom: 1px solid #eee;
        }

        .brand-name {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        nav a {
            text-decoration: none;
            color: #555;
            margin-left: 30px;
            text-transform: uppercase;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Placeholder Hero for context */
        .main-hero {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 80px);
            background-color: #fafafa;
        }

        .hero-text {
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #222;
        }

    </style>
</head>
<body>

    <div id="intro-sequence">
        
        <div id="room-view">
            <div class="character"></div>
            </div>

        <div id="smile-view">
            <div class="hero-portrait">😊</div>
            <div class="perfect-piece"></div>
            <button id="enter-cta" onclick="finishIntro()">SHOP THE ONE</button>
        </div>

    </div>

    <div id="main-site">
        <header>
            <div class="brand-name">THE ONE</div>
            <nav>
                <a href="#">New Arrivals</a>
                <a href="#">Essentials</a>
                <a href="#">About</a>
            </class>
        </header>
        
        <main class="main-hero">
            <h1 class="hero-text">Your Search Ends Here.</h1>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const roomView = document.getElementById('room-view');
            const smileView = document.getElementById('smile-view');
            
            // CONFIGURATION: Number of clothes to throw
            const numClothes = 25; 
            const chaosDuration = 4000; // 4 seconds of chaos
            
            const clothesColors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#845ef7', '#222'];

            // 1. Generate and animate flying clothes
            for (let i = 0; i < numClothes; i++) {
                setTimeout(() => {
                    const cloth = document.createElement('div');
                    cloth.className = 'flying-cloth';
                    
                    // Style attributes: Color, random start position near center
                    cloth.style.backgroundColor = clothesColors[Math.floor(Math.random() * clothesColors.length)];
                    cloth.style.left = `calc(50% - 40px + ${(Math.random() - 0.5) * 50}px)`;
                    cloth.style.top = `calc(50% - 40px + ${(Math.random() - 0.5) * 50}px)`;

                    // Set dynamic CSS variables for the animation direction
                    const angle = Math.random() * Math.PI * 2; // Random angle
                    const dist = 300 + Math.random() * 400; // Random distance
                    const rot = (Math.random() - 0.5) * 720; // Random rotation

                    cloth.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
                    cloth.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
                    cloth.style.setProperty('--rot', `${rot}deg`);

                    // Apply the animation (each cloth has slightly different speed)
                    const speed = 0.6 + Math.random() * 0.8;
                    cloth.style.animation = `scatterClothes ${speed}s ease-out forwards`;

                    roomView.appendChild(cloth);
                    
                    // Remove the DOM element after animation to keep performance high
                    setTimeout(() => {
                        cloth.remove();
                    }, speed * 1000);

                }, i * (chaosDuration / numClothes)); // Stagger the throws
            }

            // 2. Transition from Chaos to discovery
            setTimeout(() => {
                // Fade out room, activate smile view
                roomView.style.opacity = '0';
                smileView.classList.add('active');
            }, chaosDuration + 500); // Trigger shortly after the last throw finishes

        });

        // 3. Final Step: Transition to Main Site
        function finishIntro() {
            const intro = document.getElementById('intro-sequence');
            const mainSite = document.getElementById('main-site');

            // Fade out the entire experience
            intro.style.opacity = '0';

            // Reveal the homepage
            setTimeout(() => {
                intro.style.display = 'none';
                mainSite.style.display = 'block';
                // Allow scrolling again
                document.body.style.overflow = 'auto';
                
                // Trigger subtle fade-in of main site
                setTimeout(() => {
                    mainSite.style.opacity = '1';
                }, 100);
                
            }, 1500); // Match CSS fade duration
        }
    </script>
</body>
</html>
