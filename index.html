<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sky Shipments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b1d3a;
        }

        /* 3D Canvas Canvas */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Click to Enter Gate */
        #gatekeeper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gate-content {
            text-align: center;
            color: #fff;
        }

        .gate-title {
            font-size: 2.5rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .launch-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            color: #112233;
            background: #ffffff;
            border: none;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        #gatekeeper:hover .launch-btn {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255,255,255,0.2);
            background: #e6e6e6;
        }

        /* Skywriting Text Wrapper */
        #skywriting-container {
            position: absolute;
            top: 45%;
            left: 10%;
            width: 80%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        .sky-letter {
            font-size: 5.5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.95);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            transform: scale(1.3) blur(10px);
            display: inline-block;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.6), 
                         0 0 30px rgba(255, 255, 255, 0.3);
            filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.15));
        }

        /* Animation class injected via JS for letter-by-letter drawing */
        .reveal-letter {
            animation: smokeForm 0.6s cubic-bezier(0.12, 0, 0.39, 0) forwards;
        }

        @keyframes smokeForm {
            0% { opacity: 0; transform: scale(1.6) blur(15px); }
            45% { opacity: 0.8; transform: scale(0.95) blur(2px); }
            100% { opacity: 1; transform: scale(1) blur(0px); }
        }

        /* Final Landing Page Contents */
        #main-site {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 8%;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        #main-site.active {
            opacity: 1;
            pointer-events: auto;
        }

        .site-subtitle {
            color: #d1e2f3;
            font-size: 1.3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .cta-container button {
            padding: 14px 35px;
            background: transparent;
            color: white;
            border: 2px solid white;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cta-container button:hover {
            background: white;
            color: #0b1d3a;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="gatekeeper" onclick="initiateFlight()">
        <div class="gate-content">
            <h2 class="gate-title">Ready for Departure</h2>
            <button class="launch-btn">Enter Site</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="skywriting-container" id="brand-name">
        </div>

    <div id="main-site">
        <p class="site-subtitle">Next-Generation Logistics & Aerospace Freighters</p>
        <div class="cta-container">
            <button>Track Shipments</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, airplane, clouds = [];
        let animationStarted = false;
        let clock = new THREE.Clock();
        const textString = "GLOBAL SKY SHIPMENTS";

        // Setup the ThreeJS 3D Cinematic Scene
        function init3D() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a365d); // Sky Blue backdrop
            // Add volumetric fog for realism
            scene.fog = new THREE.FogExp2(0x1a365d, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Realistic Lighting Configuration
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffe6b3, 1.2);
            sunLight.position.set(100, 80, 50);
            scene.add(sunLight);

            // Procedurally build a detailed realistic Aircraft Geometry Group
            airplane = new THREE.Group();

            // Fuselage (Main Body)
            const bodyGeom = new THREE.CylinderGeometry(0.8, 0.6, 7, 16);
            bodyGeom.rotateX(Math.PI / 2);
            const metallicMat = new THREE.MeshStandardMaterial({ 
                color: 0xeeeeee, 
                metalness: 0.7, 
                roughness: 0.2 
            });
            const fuselage = new THREE.Mesh(bodyGeom, metallicMat);
            airplane.add(fuselage);

            // Cockpit Nose Cone
            const noseGeom = new THREE.SphereGeometry(0.8, 16, 16, 0, Math.PI*2, 0, Math.PI/2);
            noseGeom.rotateX(-Math.PI/2);
            noseGeom.translate(0, 0, 3.5);
            const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.1 });
            const nose = new THREE.Mesh(noseGeom, metallicMat);
            airplane.add(nose);

            // Main Wings
            const wingShape = new THREE.Shape();
            wingShape.moveTo(0, 0);
            wingShape.lineTo(6, -1.5);
            wingShape.lineTo(5.8, -2.5);
            wingShape.lineTo(0, -1);
            
            const wingExtrudeSettings = { depth: 0.08, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.02, bevelThickness: 0.02 };
            const wingGeom = new THREE.ExtrudeGeometry(wingShape, wingExtrudeSettings);
            wingGeom.rotateX(Math.PI/2);
            
            const leftWing = new THREE.Mesh(wingGeom, metallicMat);
            leftWing.position.set(0, 0, 0.5);
            airplane.add(leftWing);

            const rightWing = leftWing.clone();
            rightWing.scale.x = -1;
            airplane.add(rightWing);

            // Tail Fin (Vertical Stabilizer)
            const tailShape = new THREE.Shape();
            tailShape.moveTo(0, 0);
            tailShape.lineTo(0, 2);
            tailShape.lineTo(-1, 1.8);
            tailShape.lineTo(-1.3, 0);
            const tailGeom = new THREE.ExtrudeGeometry(tailShape, wingExtrudeSettings);
            const tailFin = new THREE.Mesh(tailGeom, metallicMat);
            tailFin.position.set(0, 0.5, -3);
            airplane.add(tailFin);

            // Dual Jet Engines
            const engineGeom = new THREE.CylinderGeometry(0.35, 0.3, 1.5, 12);
            engineGeom.rotateX(Math.PI/2);
            const engineMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8 });
            const leftEngine = new THREE.Mesh(engineGeom, engineMat);
            leftEngine.position.set(2, -0.4, 0.5);
            airplane.add(leftEngine);

            const rightEngine = leftEngine.clone();
            rightEngine.position.x = -2;
            airplane.add(rightEngine);

            // Initial hide state out of visibility range
            airplane.position.set(0, -50, 0); 
            scene.add(airplane);

            // Populate Background Sky with Volumetric Clouds
            createClouds();

            // Run rendering loops
            animate();
        }

        function createClouds() {
            const cloudGeo = new THREE.BufferGeometry();
            const count = 40;
            const posArray = new Float32Array(count * 3);

            for(let i=0; i<count*3; i+=3) {
                posArray[i] = (Math.random() - 0.5) * 120;
                posArray[i+1] = (Math.random() - 0.5) * 60 - 10;
                posArray[i+2] = (Math.random() - 0.5) * 40 - 20;
            }
            
            cloudGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            // Build soft cloud materials
            const cloudMat = new THREE.MeshStandardMaterial({
                color: 0xd9eafd,
                roughness: 0.9,
                flatShading: true
            });

            // Create low-poly cloud meshes for organic visual flair
            for (let i = 0; i < count; i++) {
                const cloudGroup = new THREE.Group();
                const tuftCount = 3 + Math.floor(Math.random() * 4);
                
                for(let j=0; j<tuftCount; j++) {
                    const tuftGeo = new THREE.DodecahedronGeometry(2 + Math.random()*3, 1);
                    const tuft = new THREE.Mesh(tuftGeo, cloudMat);
                    tuft.position.set(j*2, (Math.random() - 0.5)*2, (Math.random() - 0.5)*2);
                    cloudGroup.add(tuft);
                }
                
                cloudGroup.position.set(posArray[i*3], posArray[i*3+1], posArray[i*3+2]);
                scene.add(cloudGroup);
                clouds.push(cloudGroup);
            }
        }

        // Generate Letter layout structures ready for text generation injection
        function prepareSkywritingElements() {
            const container = document.getElementById('skywriting-container');
            container.innerHTML = '';
            for (let i = 0; i < textString.length; i++) {
                const span = document.createElement('span');
                span.className = 'sky-letter';
                // Preserve spaces structurally
                span.innerHTML = textString[i] === ' ' ? '&nbsp;' : textString[i];
                container.appendChild(span);
            }
        }

        // Core Render Matrix Frame Handler
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Gentle Ambient drifting animation of cloud layer
            clouds.forEach(cloud => {
                cloud.position.x -= delta * 2.5;
                if(cloud.position.x < -70) cloud.position.x = 70;
            });

            if (animationStarted) {
                runCinematicTimeline(time);
            }

            renderer.render(scene, camera);
        }

        let animationStartTime = 0;
        function runCinematicTimeline(elapsed) {
            let t = elapsed - animationStartTime;

            // --- STAGE 1: Swoop In and Fly in a circle ---
            if (t >= 0 && t < 4.5) {
                let circleTime = t * 1.4; // Speed scaling variable
                // Math computations for tracking a gorgeous circular banking loop
                let radius = 14;
                let angle = circleTime - Math.PI / 2; 
                
                let targetX = Math.cos(angle) * radius;
                let targetY = Math.sin(angle) * radius * 0.5 + 4;
                let targetZ = Math.sin(angle) * radius;

                airplane.position.set(targetX, targetY, targetZ);
                
                // Roll the aircraft geometry naturally into the turn
                airplane.rotation.set(0.3, -angle + Math.PI, 0.6);
            }

            // --- STAGE 2: Dive out towards the Far Corner Edge ---
            else if (t >= 4.5 && t < 6.5) {
                let segmentT = (t - 4.5) / 2; // Normalize scale down to 0-1
                
                // Linear interpolations out to extreme edge corner base
                let startX = -14, startY = 4, startZ = 0;
                let endX = -32, endY = -1, endZ = 5;

                airplane.position.x = THREE.MathUtils.lerp(startX, endX, segmentT);
                airplane.position.y = THREE.MathUtils.lerp(startY, endY, segmentT);
                airplane.position.z = THREE.MathUtils.lerp(startZ, endZ, segmentT);
                
                // Point nose directly away towards left horizon bounds
                airplane.rotation.set(0.1, Math.PI / 2, 0.1);
            }

            // --- STAGE 3: Fly Directly Across & Smoke Write out Text ---
            else if (t >= 6.5 && t < 11.5) {
                let writeDuration = 4.0;
                let segmentT = Math.min((t - 6.5) / writeDuration, 1);
                
                let startX = -32, endX = 32;
                airplane.position.x = THREE.MathUtils.lerp(startX, endX, segmentT);
                airplane.position.y = -1; // Maintain exact height locking
                airplane.position.z = 5;  // Lock depth scale near text element focus layer
                
                airplane.rotation.set(0, Math.PI / 2, 0); // Flat trajectory tracking forward

                // Calculate letter indexes based exactly on plane progression coordinates
                let letters = document.querySelectorAll('.sky-letter');
                let structuralProgressIndex = Math.floor(segmentT * letters.length * 1.1); 

                for(let i = 0; i < letters.length; i++) {
                    if (i < structuralProgressIndex && !letters[i].classList.contains('reveal-letter')) {
                        letters[i].classList.add('reveal-letter');
                    }
                }
            }
            // --- STAGE 4: Flight Exit & UI Interactive Landing Surface reveal ---
            else if (t >= 11.5) {
                // Plane flies off into sunset bounds
                airplane.position.x += 0.3;
                document.getElementById('main-site').classList.add('active');
            }
        }

        // Trigger sequence handler bound directly to user input layer click events
        function initiateFlight() {
            const gate = document.getElementById('gatekeeper');
            gate.style.opacity = '0';
            setTimeout(() => gate.style.display = 'none', 1200);

            prepareSkywritingElements();
            
            // Sync timer matrices 
            animationStartTime = clock.getElapsedTime();
            animationStarted = true;
        }

        // Initialize 3D Engine configuration properties on page initialization frames
        window.onload = () => {
            init3D();
        };

        // Enforce Responsive layout aspect tracking adaptions on browser scale events
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
