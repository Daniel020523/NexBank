<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sky Shipments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Click to Enter Screen */
        #gatekeeper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        .launch-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            color: #fff;
            background: transparent;
            border: 2px solid #fdbb2d;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(253, 187, 45, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(253, 187, 45, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(253, 187, 45, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(253, 187, 45, 0.4); }
        }

        /* Animation Stage */
        #animation-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            pointer-events: none;
        }

        .aircraft {
            position: absolute;
            font-size: 3.5rem;
            z-index: 10;
            opacity: 0;
        }

        /* Step 1: Flying around in circles */
        .fly-around-plane {
            animation: planeLoop 4s ease-in-out forwards;
        }
        .fly-around-heli {
            animation: heliLoop 4s ease-in-out forwards;
        }

        @keyframes planeLoop {
            0% { opacity: 1; left: -10%; top: 30%; transform: scale(1) rotate(0deg); }
            40% { left: 40%; top: 10%; transform: scale(1.2) rotate(-20deg); }
            70% { left: 60%; top: 60%; transform: scale(0.8) rotate(45deg); }
            100% { opacity: 1; left: 110%; top: 40%; transform: scale(1) rotate(0deg); }
        }

        @keyframes heliLoop {
            0% { opacity: 1; right: -10%; top: 60%; transform: scale(1) scaleX(-1); }
            30% { right: 30%; top: 40%; transform: scale(1.3) scaleX(-1); }
            60% { right: 50%; top: 20%; transform: scale(0.9) scaleX(-1); }
            100% { opacity: 1; right: 110%; top: 30%; transform: scale(1) scaleX(-1); }
        }

        /* Step 2: Flying straight across to write the name */
        .write-plane {
            animation: planeWrite 4s cubic-bezier(0.42, 0, 0.58, 1) forwards;
        }

        @keyframes planeWrite {
            0% { opacity: 1; left: -10%; top: 45%; transform: rotate(0deg) scale(1.2); }
            100% { opacity: 1; left: 110%; top: 45%; transform: rotate(0deg) scale(1.2); }
        }

        /* Text Reveal Container */
        .brand-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-20%, -50%); /* Offset slightly to sync with plane nose */
            width: 70%;
            max-width: 900px;
            overflow: hidden;
            white-space: nowrap;
            pointer-events: none;
        }

        .brand-text {
            font-size: 5rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 40px rgba(253, 187, 45, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
            width: 100%;
        }

        .reveal-mask {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: transparent;
        }

        .reveal-mask.active {
            animation: revealText 3s cubic-bezier(0.42, 0, 0.58, 1) forwards;
            animation-delay: 4.3s; /* Starts right when Step 2 plane enters */
        }

        @keyframes revealText {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Main Website Content (Fades in last) */
        #main-content {
            opacity: 0;
            transition: opacity 2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #main-content.visible {
            opacity: 1;
        }

        .hero-title {
            font-size: 4rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .hero-subtitle {
            font-size: 1.5rem;
            max-width: 600px;
            margin-bottom: 30px;
            color: #f1f1f1;
        }

        .cta-btn {
            padding: 15px 30px;
            background: #fdbb2d;
            border: none;
            color: #1a2a6c;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div id="gatekeeper" onclick="startExperience()">
        <button class="launch-btn">Click to Launch Sky Experience</button>
    </div>

    <div id="animation-container">
        <div id="plane" class="aircraft">✈️</div>
        <div id="heli" class="aircraft">🚁</div>
        
        <div class="brand-container">
            <div id="mask" class="reveal-mask">
                <h1 class="brand-text">Global Sky Shipments</h1>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1 class="hero-title">Global Sky Shipments</h1>
        <p class="hero-subtitle">Fast, reliable, and secure logistics moving across horizons. Your premier global cargo network.</p>
        <button class="cta-btn">Explore Fleet</button>
    </div>

    <script>
        function startExperience() {
            // Hide the entry gate
            const gate = document.getElementById('gatekeeper');
            gate.style.opacity = '0';
            setTimeout(() => gate.style.display = 'none', 1000);

            // Show the animation track
            const container = document.getElementById('animation-container');
            container.style.display = 'block';

            const plane = document.getElementById('plane');
            const heli = document.getElementById('heli');
            const mask = document.getElementById('mask');
            const mainContent = document.getElementById('main-content');

            // --- PHASE 1: Fly Around ---
            plane.classList.add('fly-around-plane');
            heli.classList.add('fly-around-heli');

            // --- PHASE 2: Reset and Fly Across to write name ---
            setTimeout(() => {
                // Remove Phase 1 classes
                plane.classList.remove('fly-around-plane');
                heli.classList.remove('fly-around-heli');
                
                // Hide the helicopter for the clean writing phase, optimize plane direction
                heli.style.display = 'none'; 
                
                // Trigger the text reveal and horizontal flight simultaneously
                void plane.offsetWidth; // Force a CSS reflow to restart animations cleanly
                plane.classList.add('write-plane');
                mask.classList.add('active');
            }, 4000); // Triggers exactly after Phase 1 ends (4 seconds)

            // --- PHASE 3: Fade in the actual website interface ---
            setTimeout(() => {
                plane.style.display = 'none';
                mainContent.classList.add('visible');
            }, 8000); 
        }
    </script>
</body>
</html>
