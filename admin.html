<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forbright Bank — Support console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0d1512;
    --ink-2:#131e19;
    --paper:#f3f5f4;
    --paper-2:#ffffff;
    --jade:#1f6f54;
    --jade-dark:#154f3c;
    --gold:#c89b3c;
    --ink-muted:#8a9a93;
    --slate:#232b27;
    --slate-muted:#6b756f;
    --line:#dde3e0;
    --error:#b3452f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Manrope', sans-serif;
    background:var(--paper);
    color:var(--slate);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- LOGIN VIEW ---------- */
  .login-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.5rem;
  }
  .login-card{
    width:100%;
    max-width:360px;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:16px;
    padding:2rem;
  }
  .brand{display:flex; align-items:center; gap:.6rem; margin-bottom:1.6rem;}
  .brand-mark{
    width:26px;height:26px;
    border-radius:50%;
    border:1.5px solid var(--gold);
    position:relative;
    flex-shrink:0;
  }
  .brand-mark::after{
    content:"";
    position:absolute; top:50%; left:50%;
    width:60%; height:1.5px;
    background:var(--gold);
    transform:translate(-50%,-50%) rotate(-38deg);
  }
  .brand-name{font-family:'Fraunces', serif; font-weight:600; font-size:1.05rem;}

  .login-card h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.35rem;
    margin:0 0 .3rem;
  }
  .login-card .sub{
    color:var(--slate-muted);
    font-size:.88rem;
    margin:0 0 1.6rem;
  }

  .field{margin-bottom:1rem;}
  .field label{
    display:block;
    font-size:.78rem;
    font-weight:600;
    margin-bottom:.4rem;
  }
  .field input{
    width:100%;
    padding:.75rem .85rem;
    border:1.5px solid var(--line);
    border-radius:9px;
    font-family:'Manrope', sans-serif;
    font-size:.92rem;
    background:var(--paper);
    color:var(--slate);
  }
  .field input:focus{outline:none; border-color:var(--jade); box-shadow:0 0 0 3px rgba(31,111,84,.14);}

  .banner{
    display:none;
    padding:.65rem .8rem;
    border-radius:8px;
    font-size:.82rem;
    margin-bottom:1rem;
    background:#fbeae6;
    color:var(--error);
    border:1px solid #f0c9bf;
    line-height:1.4;
  }
  .banner.show{display:block;}

  .login-btn{
    width:100%;
    padding:.8rem 0;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:9px;
    font-family:'Manrope', sans-serif;
    font-weight:700;
    font-size:.92rem;
    cursor:pointer;
  }
  .login-btn:hover{background:var(--jade-dark);}
  .login-btn:disabled{opacity:.6; cursor:not-allowed;}

  .back-link{
    display:block;
    text-align:center;
    margin-top:1.2rem;
    font-size:.83rem;
    color:var(--slate-muted);
    text-decoration:none;
  }
  .back-link:hover{color:var(--jade-dark);}

  /* ---------- CONSOLE VIEW ---------- */
  .console-screen{
    display:none;
    height:100vh;
    flex-direction:column;
  }
  .console-screen.active{display:flex;}

  .console-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:.9rem 1.6rem;
    background:var(--ink);
    color:var(--paper);
    flex-shrink:0;
  }
  .console-nav .brand-name{color:var(--paper);}
  .console-nav .brand-mark{border-color:var(--gold);}
  .console-nav .tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:.7rem;
    letter-spacing:.08em;
    color:var(--gold);
    text-transform:uppercase;
    margin-left:.5rem;
  }
  .console-signout{
    padding:.45rem .9rem;
    border:1.5px solid rgba(243,245,244,.25);
    background:transparent;
    color:var(--paper);
    border-radius:8px;
    font-family:'Manrope', sans-serif;
    font-weight:600;
    font-size:.8rem;
    cursor:pointer;
  }
  .console-signout:hover{border-color:var(--paper);}

  .console-body{
    flex:1;
    display:block;
    overflow:hidden;
    position:relative;
  }

  .conv-list{
    height:100%;
    background:var(--paper-2);
    overflow-y:auto;
  }
  .conv-list-header{
    padding:1rem 1.1rem .6rem;
    font-family:'IBM Plex Mono', monospace;
    font-size:.7rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--slate-muted);
  }
  .conv-item{
    display:block;
    width:100%;
    text-align:left;
    padding:.85rem 1.1rem;
    border:none;
    border-bottom:1px solid var(--line);
    background:transparent;
    cursor:pointer;
  }
  .conv-item:hover{background:var(--paper);}
  .conv-item.active{background:#e9f4ef;}
  .conv-item .who{
    font-weight:700;
    font-size:.88rem;
    margin-bottom:.2rem;
  }
  .conv-item .preview{
    font-size:.78rem;
    color:var(--slate-muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .conv-empty{
    padding:2rem 1.2rem;
    color:var(--slate-muted);
    font-size:.85rem;
    text-align:center;
  }

  .thread-panel{
    display:none;
    flex-direction:column;
    overflow:hidden;
  }

  /* ---------- FULLSCREEN THREAD OVERLAY ---------- */
  .thread-panel.fullscreen{
    display:flex;
    position:fixed;
    inset:0;
    z-index:50;
    background:var(--paper);
  }
  .thread-back{
    display:none;
    align-items:center;
    gap:.5rem;
    background:transparent;
    border:none;
    color:var(--slate);
    font-family:'Manrope', sans-serif;
    font-weight:700;
    font-size:.85rem;
    cursor:pointer;
    padding:.3rem .4rem .3rem 0;
  }
  .thread-panel.fullscreen .thread-back{display:inline-flex;}
  .thread-header{
    padding:1rem 1.4rem;
    border-bottom:1px solid var(--line);
    background:var(--paper-2);
    font-weight:700;
    font-size:.95rem;
    display:flex;
    align-items:center;
    gap:.6rem;
    flex-shrink:0;
  }
  .thread-body{
    flex:1;
    overflow-y:auto;
    padding:1.2rem 1.4rem;
    display:flex;
    flex-direction:column;
    gap:.6rem;
  }
  .chat-msg{
    max-width:60%;
    padding:.6rem .85rem;
    border-radius:12px;
    font-size:.88rem;
    line-height:1.4;
  }
  .chat-msg.from-user{
    align-self:flex-start;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-bottom-left-radius:3px;
  }
  .chat-msg.from-admin{
    align-self:flex-end;
    background:var(--jade);
    color:var(--paper);
    border-bottom-right-radius:3px;
  }
  .chat-msg img{
    max-width:100%;
    border-radius:8px;
    margin-top:.4rem;
  }
  .thread-empty{
    margin:auto;
    color:var(--slate-muted);
    font-size:.9rem;
    text-align:center;
  }

  .thread-input-row{
    display:flex;
    gap:.7rem;
    padding:1rem 1.4rem;
    border-top:1px solid var(--line);
    background:var(--paper-2);
    flex-shrink:0;
    align-items:flex-end;
  }
  .thread-input-row input[type="text"]{
    flex:1;
    padding:.7rem .9rem;
    border:1.5px solid var(--line);
    border-radius:9px;
    font-family:'Manrope', sans-serif;
    font-size:.9rem;
  }
  .thread-input-row input[type="text"]:focus{outline:none; border-color:var(--jade);}
  .thread-input-row input[type="file"]{
    display:none;
  }
  .upload-btn{
    padding:.7rem;
    background:transparent;
    color:var(--slate-muted);
    border:1.5px solid var(--line);
    border-radius:9px;
    font-size:1rem;
    cursor:pointer;
  }
  .upload-btn:hover{color:var(--jade); border-color:var(--jade);}
  .thread-input-row button{
    padding:.7rem 1.2rem;
    background:var(--jade);
    color:var(--paper);
    border:none;
    border-radius:9px;
    font-family:'Manrope', sans-serif;
    font-weight:700;
    font-size:.87rem;
    cursor:pointer;
  }
  .thread-input-row button:hover{background:var(--jade-dark);}
  .thread-input-row button:disabled{opacity:.5; cursor:not-allowed;}

  /* ---------- IMAGE VIEWER MODAL ---------- */
  .image-overlay{
    position:fixed; inset:0;
    background:rgba(13,21,18,.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .image-overlay.open{display:flex;}

  .image-viewer{
    position:relative;
    max-width:90vw;
    max-height:90vh;
    background:var(--paper-2);
    border-radius:12px;
    overflow:hidden;
  }
  .image-viewer img{
    display:block;
    max-width:100%;
    max-height:85vh;
    width:auto;
    height:auto;
  }
  .image-controls{
    display:flex;
    justify-content:flex-end;
    gap:.5rem;
    padding:.8rem;
    background:var(--paper-2);
    border-top:1px solid var(--line);
  }
  .image-close{
    background:transparent;
    border:none;
    color:var(--slate-muted);
    font-size:1.4rem;
    line-height:1;
    cursor:pointer;
    padding:.3rem .5rem;
  }
  .image-close:hover{color:var(--slate);}
  .image-download{
    padding:.5rem 1rem;
    background:var(--jade);
    color:var(--paper);
    border:none;
    border-radius:8px;
    font-family:'Manrope', sans-serif;
    font-weight:700;
    font-size:.85rem;
    cursor:pointer;
  }
  .image-download:hover{background:var(--jade-dark);}

</style>
</head>
<body>

<!-- LOGIN VIEW -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Forbright</span>
    </div>
    <h1>Support console</h1>
    <p class="sub">For Forbright support agents only.</p>

    <div class="banner" id="loginBanner"></div>

    <form id="adminLoginForm" novalidate>
      <div class="field">
        <label for="adminEmail">Email</label>
        <input type="email" id="adminEmail" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="adminPw">Password</label>
        <input type="password" id="adminPw" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="adminLoginBtn">Log in</button>
    </form>

    <a class="back-link" href="forbright-auth.html">← Back to customer login</a>
  </div>
</div>

<!-- CONSOLE VIEW -->
<div class="console-screen" id="consoleScreen">
  <div class="console-nav">
    <div style="display:flex; align-items:center;">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name" style="margin-left:.6rem;">Forbright</span>
      <span class="tag">Support console</span>
    </div>
    <button class="console-signout" id="consoleSignOut">Log out</button>
  </div>

  <div class="console-body">
    <div class="conv-list" id="convList">
      <div class="conv-list-header">Open conversations</div>
      <div class="conv-empty" id="convEmpty">No conversations yet.</div>
    </div>

    <div class="thread-panel" id="threadPanel">
      <div class="thread-header" id="threadHeader">
        <button class="thread-back" id="threadBack" type="button">← Back</button>
        <span id="threadHeaderText">Select a conversation</span>
      </div>
      <div class="thread-body" id="threadBody"></div>
      <div class="thread-input-row">
        <input type="text" id="replyInput" placeholder="Type a reply…" disabled>
        <input type="file" id="imageInput" accept="image/*">
        <button type="button" class="upload-btn" id="uploadImageBtn" disabled title="Upload image">📎</button>
        <button id="sendReply" disabled>Send</button>
      </div>
    </div>
  </div>
</div>

<!-- IMAGE VIEWER MODAL -->
<div class="image-overlay" id="imageOverlay">
  <div class="image-viewer">
    <img id="viewerImage" src="" alt="Full size image">
    <div class="image-controls">
      <button class="image-download" id="downloadImageBtn">↓ Download</button>
      <button class="image-close" id="closeImageViewer" aria-label="Close image">×</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // SUPABASE CONFIG — replace these two placeholders
  // (use the same project as the other pages)
  // ============================================================
  const SUPABASE_URL = "https://kmjmqrrmzdtovovzigxk.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_y8Ai2hQcJfHSU5ilkEFCSg_lmh1_leb";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentAdmin = null;
  let activeUserId = null;
  let conversations = new Map(); // user_id -> { lastMessage, lastSender, lastTime }
  let realtimeChannel = null;
  let selectedImage = null;
  let currentViewerImage = null;
  let renderedMessageIds = new Set(); // dedupe: messages already painted into the open thread

  function showBanner(message){
    const el = document.getElementById('loginBanner');
    el.textContent = message;
    el.className = 'banner show';
  }

  function openImageViewer(imageSrc){
    currentViewerImage = imageSrc;
    document.getElementById('viewerImage').src = imageSrc;
    document.getElementById('imageOverlay').classList.add('open');
  }

  function closeImageViewer(){
    document.getElementById('imageOverlay').classList.remove('open');
    document.getElementById('viewerImage').src = '';
    currentViewerImage = null;
  }

  document.getElementById('closeImageViewer').addEventListener('click', closeImageViewer);
  document.getElementById('imageOverlay').addEventListener('click', (e)=>{
    if(e.target.id === 'imageOverlay') closeImageViewer();
  });

  document.getElementById('downloadImageBtn').addEventListener('click', ()=>{
    if(!currentViewerImage) return;

    const link = document.createElement('a');
    link.href = currentViewerImage;
    link.download = `image-${Date.now()}.jpg`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });

  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape' && document.getElementById('imageOverlay').classList.contains('open')){
      closeImageViewer();
    }
  });

  document.getElementById('uploadImageBtn').addEventListener('click', ()=>{
    document.getElementById('imageInput').click();
  });

  document.getElementById('imageInput').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = (event)=>{
      selectedImage = event.target.result;
      document.getElementById('uploadImageBtn').textContent = '✓ Image ready';
      document.getElementById('uploadImageBtn').style.color = 'var(--jade)';
    };
    reader.readAsDataURL(file);
  });

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---- login ----
  document.getElementById('adminLoginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    document.getElementById('loginBanner').className = 'banner';

    const email = document.getElementById('adminEmail').value.trim();
    const pw = document.getElementById('adminPw').value;
    const btn = document.getElementById('adminLoginBtn');
    btn.disabled = true;
    btn.textContent = 'Logging in…';

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pw });

    if(error){
      btn.disabled = false;
      btn.textContent = 'Log in';
      showBanner(error.message);
      return;
    }

    // Confirm this account is on the admins allowlist
    const { data: adminRow, error: adminError } = await supabaseClient
      .from('admins')
      .select('id')
      .eq('id', data.user.id)
      .maybeSingle();

    if(adminError || !adminRow){
      await supabaseClient.auth.signOut();
      btn.disabled = false;
      btn.textContent = 'Log in';
      showBanner('This account isn\'t set up as a support agent.');
      return;
    }

    currentAdmin = data.user;
    enterConsole();
  });

  function enterConsole(){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('consoleScreen').classList.add('active');
    loadConversations();
    subscribeRealtime();
  }

  document.getElementById('consoleSignOut').addEventListener('click', async ()=>{
    await supabaseClient.auth.signOut();
    window.location.href = 'admin.html';
  });

  // ---- load all conversations, grouped by customer (used for initial load only) ----
  async function loadConversations(){
    const { data, error } = await supabaseClient
      .from('support_messages')
      .select('*')
      .order('created_at', { ascending: true });

    if(error){
      document.getElementById('convEmpty').textContent = 'Could not load conversations.';
      return;
    }

    conversations = new Map();
    data.forEach(m=>{
      conversations.set(m.user_id, {
        lastMessage: m.message,
        lastSender: m.sender,
        lastTime: m.created_at
      });
    });

    renderConvList();

    if(activeUserId){
      loadThread(activeUserId);
    }
  }

  // Update just one conversation's preview in-place — no refetch needed
  function updateConversationPreview(m){
    conversations.set(m.user_id, {
      lastMessage: m.message,
      lastSender: m.sender,
      lastTime: m.created_at
    });
    renderConvList();
  }

  function renderConvList(){
    const list = document.getElementById('convList');
    const header = '<div class="conv-list-header">Open conversations</div>';

    if(conversations.size === 0){
      list.innerHTML = header + '<div class="conv-empty" id="convEmpty">No conversations yet.</div>';
      return;
    }

    const sorted = Array.from(conversations.entries()).sort((a,b)=>
      new Date(b[1].lastTime) - new Date(a[1].lastTime)
    );

    list.innerHTML = header + sorted.map(([userId, info])=>{
      const activeClass = userId === activeUserId ? ' active' : '';
      const shortId = userId.slice(0,8);
      const prefix = info.lastSender === 'admin' ? 'You: ' : '';
      return `<button class="conv-item${activeClass}" data-user="${userId}">
        <div class="who">Customer ${shortId}</div>
        <div class="preview">${prefix}${escapeHtml(info.lastMessage)}</div>
      </button>`;
    }).join('');

    list.querySelectorAll('.conv-item').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        activeUserId = btn.dataset.user;
        renderConvList();
        loadThread(activeUserId);
        openFullscreen();
      });
    });
  }

  function openFullscreen(){
    document.getElementById('threadPanel').classList.add('fullscreen');
  }

  function closeFullscreen(){
    document.getElementById('threadPanel').classList.remove('fullscreen');
    document.getElementById('threadBody').innerHTML = '';
    document.getElementById('threadHeaderText').textContent = 'Select a conversation';
    document.getElementById('replyInput').value = '';
    document.getElementById('replyInput').disabled = true;
    document.getElementById('sendReply').disabled = true;
    document.getElementById('uploadImageBtn').disabled = true;
    document.getElementById('uploadImageBtn').textContent = '📎';
    document.getElementById('uploadImageBtn').style.color = 'var(--slate-muted)';
    document.getElementById('imageInput').value = '';
    selectedImage = null;
    activeUserId = null;
    renderedMessageIds = new Set();
    renderConvList();
  }

  document.getElementById('threadBack').addEventListener('click', closeFullscreen);

  // Build the DOM node for one message
  function buildMessageEl(m){
    const cls = m.sender === 'admin' ? 'from-admin' : 'from-user';
    let content = escapeHtml(m.message);
    if(m.image_url){
      content += `<img src="${m.image_url}" alt="Attached image" style="cursor:pointer;" class="chat-image" data-src="${m.image_url}">`;
    }
    const wrapper = document.createElement('div');
    wrapper.className = `chat-msg ${cls}`;
    wrapper.dataset.id = m.id;
    wrapper.innerHTML = content;
    const img = wrapper.querySelector('.chat-image');
    if(img){
      img.addEventListener('click', ()=> openImageViewer(img.dataset.src));
    }
    return wrapper;
  }

  // Append a single message to the open thread instantly (no refetch)
  function appendMessageToThread(m){
    if(m.id != null){
      if(renderedMessageIds.has(m.id)) return; // already painted (avoids admin double-render)
      renderedMessageIds.add(m.id);
    }
    const body = document.getElementById('threadBody');
    const emptyState = body.querySelector('.thread-empty');
    if(emptyState) emptyState.remove();
    body.appendChild(buildMessageEl(m));
    body.scrollTop = body.scrollHeight;
  }

  async function loadThread(userId){
    document.getElementById('threadHeaderText').textContent = 'Customer ' + userId.slice(0,8);
    document.getElementById('replyInput').disabled = false;
    document.getElementById('sendReply').disabled = false;
    document.getElementById('uploadImageBtn').disabled = false;
    renderedMessageIds = new Set();

    const { data, error } = await supabaseClient
      .from('support_messages')
      .select('*')
      .eq('user_id', userId)
      .order('created_at', { ascending: true });

    const body = document.getElementById('threadBody');
    if(error || !data || data.length === 0){
      body.innerHTML = '<div class="thread-empty">No messages yet.</div>';
      return;
    }

    body.innerHTML = '';
    data.forEach(m=>{
      renderedMessageIds.add(m.id);
      body.appendChild(buildMessageEl(m));
    });
    body.scrollTop = body.scrollHeight;
  }

  async function sendReply(){
    const input = document.getElementById('replyInput');
    const text = input.value.trim();
    if((!text && !selectedImage) || !activeUserId) return;

    const btn = document.getElementById('sendReply');
    btn.disabled = true;

    let imageUrl = null;

    // Upload image to Supabase Storage if selected
    if(selectedImage){
      const fileName = `${activeUserId}/${Date.now()}.jpg`;

      // Convert base64 to blob
      const base64Data = selectedImage.split(',')[1];
      const binaryData = atob(base64Data);
      const byteArray = new Uint8Array(binaryData.length);
      for(let i = 0; i < binaryData.length; i++){
        byteArray[i] = binaryData.charCodeAt(i);
      }
      const blob = new Blob([byteArray], { type: 'image/jpeg' });

      const { data: uploadData, error: uploadError } = await supabaseClient.storage
        .from('support-images')
        .upload(fileName, blob);

      if(uploadError){
        btn.disabled = false;
        alert('Failed to upload image. Please try again.');
        return;
      }

      // Get public URL
      const { data: urlData } = supabaseClient.storage
        .from('support-images')
        .getPublicUrl(fileName);

      imageUrl = urlData.publicUrl;
    }

    const messageObj = {
      user_id: activeUserId,
      sender: 'admin',
      message: text || '(Image)'
    };

    if(imageUrl){
      messageObj.image_url = imageUrl;
    }

    // .select().single() returns the inserted row (with id + created_at) immediately,
    // so we can paint it into the thread without waiting on a second round-trip.
    const { data: inserted, error } = await supabaseClient
      .from('support_messages')
      .insert(messageObj)
      .select()
      .single();

    btn.disabled = false;

    if(!error && inserted){
      input.value = '';
      selectedImage = null;
      document.getElementById('uploadImageBtn').textContent = '📎';
      document.getElementById('uploadImageBtn').style.color = 'var(--slate-muted)';
      document.getElementById('imageInput').value = '';

      // Instant paint — no refetch
      appendMessageToThread(inserted);
      updateConversationPreview(inserted);
    } else if(error){
      alert('Failed to send message. Please try again.');
    }
  }

  document.getElementById('sendReply').addEventListener('click', sendReply);
  document.getElementById('replyInput').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') sendReply();
  });

  // ---- live updates across all conversations ----
  // Instead of refetching everything on every insert, read the row straight
  // off the realtime payload and paint it directly. This is what makes new
  // messages (from customers, or from this admin in another tab) show up
  // instantly instead of only after a reload.
  function subscribeRealtime(){
    if(realtimeChannel) return;
    realtimeChannel = supabaseClient
      .channel('admin-support-console')
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'support_messages'
      }, (payload) => {
        const m = payload.new;
        if(!m) return;

        updateConversationPreview(m);

        if(m.user_id === activeUserId){
          appendMessageToThread(m);
        }
      })
      .subscribe();
  }

  // ---- if already logged in as an admin, skip the login form ----
  (async function init(){
    const { data: sessionData } = await supabaseClient.auth.getSession();
    if(!sessionData.session) return;

    const { data: adminRow } = await supabaseClient
      .from('admins')
      .select('id')
      .eq('id', sessionData.session.user.id)
      .maybeSingle();

    if(adminRow){
      currentAdmin = sessionData.session.user;
      enterConsole();
    }
  })();
</script>
