<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NexBank - Transfer Details</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #171c2e;
    --border: rgba(255,255,255,0.07);
    --accent: #4f8bff;
    --accent2: #7c5cfc;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --green: #22d07a;
    --red: #ff5a5a;
    --input-focus: rgba(79,139,255,0.25);
  }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    overflow-x: hidden;
  }

  .ambient {
    position: fixed;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    height: 340px;
    background: radial-gradient(circle, rgba(79,139,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAVIGATION HEADER ── */
  .header {
    padding: 32px 20px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 10;
  }
  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    text-decoration: none;
    font-size: 18px;
    font-weight: 600;
    transition: background-color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .back-btn:hover {
    background: var(--surface2);
    border-color: rgba(79,139,255,0.3);
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }

  /* ── MAIN CONTENT & FORM ── */
  .content {
    padding: 0 20px 110px;
    position: relative;
    z-index: 10;
  }

  .input-group {
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
  }
  .input-group label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding-left: 4px;
  }
  .input-field, .select-field {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  .input-field:focus, .select-field:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--input-focus);
  }
  .input-field::placeholder {
    color: rgba(107, 122, 153, 0.4);
  }

  /* Custom Select Wrapper Arrow */
  .select-wrapper {
    position: relative;
  }
  .select-wrapper::after {
    content: '▼';
    font-size: 10px;
    color: var(--muted);
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  /* Feedback Section Styles */
  .status-container {
    margin-top: 4px;
    min-height: 20px;
    padding-left: 4px;
    display: flex;
    align-items: center;
  }
  
  .spinner-wrapper {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--accent);
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(79, 139, 255, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: rotate 0.6s linear infinite;
  }
  
  .verification-name {
    display: none;
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
  }
  .error-message {
    display: none;
    font-size: 12px;
    font-weight: 500;
    color: var(--red);
  }

  /* Amount Input Sub-layout */
  .amount-wrapper {
    position: relative;
  }
  .amount-wrapper .currency-symbol {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
  }
  .amount-wrapper .input-field {
    padding-left: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    margin-top: 16px;
    box-shadow: 0 4px 20px rgba(79,139,255,0.25);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(79,139,255,0.4);
  }
  .submit-btn:active {
    transform: scale(0.98);
  }
  .submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Submit feedback toast */
  .toast {
    display: none;
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    z-index: 200;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.success { color: var(--green); border-color: rgba(34,208,122,0.3); }
  .toast.error   { color: var(--red);   border-color: rgba(255,90,90,0.3); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 390px;
    background: rgba(10,13,20,0.93);
    backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
    border-top: 1px solid var(--border);
    padding: 10px 0 env(safe-area-inset-bottom, 16px);
    display: flex; justify-content: space-around;
    z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 20px; text-decoration: none; color: var(--muted);
    font-family: 'Sora', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item.active { color: var(--accent); }

  .nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .nav-label { font-size: 10px; font-weight: 500; }

  @keyframes rotate {
    to { transform: rotate(360deg); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .header { animation: fadeUp 0.35s ease both; }
  .content { animation: fadeUp 0.4s 0.05s ease both; }
</style>
</head>
<body>
<div class="phone">
  <div class="ambient" aria-hidden="true"></div>

  <!-- NAVIGATION HEADER -->
  <header class="header">
    <a href="pay.html" class="back-btn" aria-label="Go back to Pay and Transfer">‹</a>
    <h1>Transfer Funds</h1>
  </header>

  <!-- MAIN CONTENT -->
  <main class="content">
    <form onsubmit="handleFormSubmit(event)">
      
      <!-- SELECT BANK -->
      <div class="input-group">
        <label for="bank-select">Select Bank</label>
        <div class="select-wrapper">
          <select id="bank-select" class="select-field" required>
            <option value="" disabled selected hidden>Select bank</option>
            <option value="paypal">PayPal</option>
          </select>
        </div>
      </div>

      <!-- PAYPAL EMAIL -->
      <div class="input-group">
        <label for="paypal-email">PayPal Account Email</label>
        <input type="email" id="paypal-email" class="input-field" placeholder="Enter account email" required autocomplete="off" oninput="validateEmailField(this.value)">
        
        <div class="status-container">
          <div id="spinner-container" class="spinner-wrapper">
            <div class="spinner"></div>
            <span>Searching account details...</span>
          </div>
          <div id="verified-name" class="verification-name">👤 Kassandra A R M Horvath</div>
          <div id="error-msg" class="error-message">⚠️ Account not found. Please verify details.</div>
        </div>
      </div>

      <!-- AMOUNT -->
      <div class="input-group">
        <label for="transfer-amount">Amount (USD)</label>
        <div class="amount-wrapper">
          <span class="currency-symbol">$</span>
          <input type="number" id="transfer-amount" class="input-field" step="0.01" min="0.01" max="21690.70" placeholder="0.00" required oninput="validateAmountField(this)">
        </div>
        <div class="status-container" style="min-height: auto; margin-top: 2px;">
          <div id="amount-error" class="error-message">⚠️ Insufficient Funds</div>
        </div>
      </div>

      <!-- PROCEED BUTTON -->
      <button type="submit" id="submit-button" class="submit-btn" disabled>Proceed</button>
    </form>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <div class="nav-icon" aria-hidden="true">🏦</div>
      <span class="nav-label">Accounts</span>
    </a>
    <a href="pay.html" class="nav-item active">
      <div class="nav-icon" aria-hidden="true">💸</div>
      <span class="nav-label">Pay &amp; Transfer</span>
    </a>
    <a href="more.html" class="nav-item">
      <div class="nav-icon" aria-hidden="true">☰</div>
      <span class="nav-label">More</span>
    </a>
  </nav>
</div>

     your real Project URL and anon/public key.

<script>
  // ╔══════════════════════════════════════════╗
  // ║          SUPABASE CONFIGURATION          ║
  // ╚══════════════════════════════════════════╝
  const SUPABASE_URL  = 'https://dmavecishluzeqdddaqy.supabase.co'; // ← replace
  const SUPABASE_KEY  = 'sb_publishable_aTPFO65SpkKXmku2Nm7XGQ_tgRcXpFg';                // ← replace

  // ── SQL to create the table (run once in Supabase SQL Editor) ──────────
  // CREATE TABLE transfers (
  //   id          uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  //   bank        text NOT NULL,
  //   email       text NOT NULL,
  //   amount      numeric(12, 2) NOT NULL,
  //   created_at  timestamptz DEFAULT now()
  // );
  // ──────────────────────────────────────────────────────────────────────

  /**
   * Minimal Supabase REST helper — no SDK dependency required.
   * Inserts a single row into the given table.
   */
  async function supabaseInsert(table, payload) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }

    return res.json();
  }

  // ── Toast helper ──────────────────────────────────────────────────────
  function showToast(message, type = 'success', duration = 3000) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type}`;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, duration);
  }

  // ── Form logic ────────────────────────────────────────────────────────
  const targetEmail = "pepsicola6699@gmail.com";
  let timeoutId = null;
  let isEmailValid = false;

  function validateEmailField(value) {
    const spinner      = document.getElementById('spinner-container');
    const verifiedName = document.getElementById('verified-name');
    const errorMsg     = document.getElementById('error-msg');

    verifiedName.style.display = 'none';
    errorMsg.style.display     = 'none';
    isEmailValid = false;
    updateSubmitButtonState();

    if (!value) { spinner.style.display = 'none'; return; }

    spinner.style.display = 'flex';
    clearTimeout(timeoutId);

    timeoutId = setTimeout(() => {
      spinner.style.display = 'none';
      if (value.trim().toLowerCase() === targetEmail) {
        verifiedName.style.display = 'block';
        isEmailValid = true;
      } else {
        errorMsg.style.display = 'block';
      }
      updateSubmitButtonState();
    }, 450);
  }

  function validateAmountField(input) {
    const amountError = document.getElementById('amount-error');
    if (parseFloat(input.value) > 21000.00) {
      amountError.style.display = 'block';
    } else {
      amountError.style.display = 'none';
    }
    updateSubmitButtonState();
  }

  function updateSubmitButtonState() {
    const amountInput  = document.getElementById('transfer-amount');
    const submitBtn    = document.getElementById('submit-button');
    const parsedAmount = parseFloat(amountInput.value);
    const isAmountValid = !isNaN(parsedAmount) && parsedAmount > 0 && parsedAmount <= 21690.70;

    if (isEmailValid && isAmountValid) {
      submitBtn.removeAttribute('disabled');
    } else {
      submitBtn.setAttribute('disabled', 'true');
    }
  }

  async function handleFormSubmit(event) {
    event.preventDefault();
    if (!isEmailValid) return;

    const submitBtn = document.getElementById('submit-button');
    const bank      = document.getElementById('bank-select').value;
    const email     = document.getElementById('paypal-email').value.trim().toLowerCase();
    const amount    = parseFloat(document.getElementById('transfer-amount').value);

    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving…';

    try {
      await supabaseInsert('transfers', { bank, email, amount });
      console.log('Supabase insert successful.');
      window.location.href = 'proceed.html';
    } catch (err) {
      console.error('Supabase error:', err);
      showToast(`❌ Save failed: ${err.message}`, 'error', 5000);
    } finally {
      submitBtn.textContent = 'Proceed';
      updateSubmitButtonState();
    }
  }
</script>
</body>
</html>
